<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Someone Painted This Before</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0e0e0e;
      color: #e8e8e8;
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    #container {
      max-width: 660px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      text-align: center;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: #e8e8e8;
    }

    #subtitle {
      font-size: 1.15rem;
      color: #777;
      line-height: 1.9;
      font-style: italic;
    }

    #mood-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .mood-btn {
      padding: 10px 26px;
      background: transparent;
      border: 1px solid #333;
      color: #999;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.15rem;
      font-style: italic;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mood-btn:hover {
      border-color: #777;
      color: #e8e8e8;
    }

    .mood-btn.selected {
      border-color: #aaa;
      color: #ffffff;
      background: #1a1a1a;
    }

    input {
      width: 100%;
      max-width: 400px;
      padding: 10px 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid #333;
      color: #e8e8e8;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.15rem;
      font-style: italic;
      outline: none;
      text-align: center;
    }

    input::placeholder { color: #444; }
    input:focus { border-bottom-color: #777; }

    #find-btn {
      padding: 12px 36px;
      background: transparent;
      border: 1px solid #555;
      color: #e8e8e8;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
    }

    #find-btn:hover { border-color: #aaa; }

    #loading {
      color: #555;
      font-size: 1.05rem;
      font-style: italic;
    }

    #error {
      color: #a05050;
      font-size: 1rem;
      font-style: italic;
    }

    #result {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 100%;
    }

    #mood-display {
      font-size: 0.95rem;
      color: #555;
      font-style: italic;
      letter-spacing: 0.06em;
    }

    #painting-img {
      max-width: 100%;
      max-height: 540px;
      object-fit: contain;
    }

    #painting-title {
      font-size: 1.4rem;
      color: #e8e8e8;
      letter-spacing: 0.04em;
    }

    #painting-artist {
      font-size: 1rem;
      color: #666;
    }

    #painting-date {
      font-size: 0.85rem;
      color: #444;
    }

    #painting-caption {
      font-size: 1rem;
      color: #666;
      font-style: italic;
      max-width: 440px;
      line-height: 1.9;
    }

    #try-again {
      padding: 10px 26px;
      background: transparent;
      border: 1px solid #333;
      color: #777;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1rem;
      font-style: italic;
      cursor: pointer;
      transition: all 0.2s;
    }

    #try-again:hover { border-color: #777; color: #e8e8e8; }
  </style>
</head>
<body>
  <div id="container">
    <h1>Someone Painted This Before</h1>
    <p id="subtitle">Choose how you're feeling. Find the painting that holds it.</p>

    <div id="mood-grid"></div>

    <input type="text" id="custom-mood" placeholder="or type your own word" />

    <button id="find-btn">Find my painting</button>

    <div id="loading" style="display:none">Looking...</div>
    <div id="error" style="display:none"></div>

    <div id="result" style="display:none">
      <div id="mood-display"></div>
      <img id="painting-img" src="" alt="" />
      <div id="painting-title"></div>
      <div id="painting-artist"></div>
      <div id="painting-date"></div>
      <div id="painting-caption"></div>
      <button id="try-again">find another</button>
    </div>
  </div>

  <script>
    const ALL_MOODS = [
      { word: "melancholy", artist: "Caspar David Friedrich" },
      { word: "restless", artist: "Eugene Delacroix" },
      { word: "tender", artist: "Mary Cassatt" },
      { word: "ecstatic", artist: "El Greco" },
      { word: "afraid", artist: "Francisco Goya" },
      { word: "lonely", artist: "Edward Hopper" },
      { word: "reverent", artist: "Rembrandt" },
      { word: "furious", artist: "Peter Paul Rubens" },
      { word: "hopeful", artist: "Camille Corot" },
      { word: "grief", artist: "Giovanni Bellini" },
      { word: "serene", artist: "Johannes Vermeer" },
      { word: "anxious", artist: "James Ensor" },
      { word: "nostalgic", artist: "Winslow Homer" },
      { word: "defiant", artist: "Jacques-Louis David" },
      { word: "dreaming", artist: "Odilon Redon" },
      { word: "exhausted", artist: "Honore Daumier" },
      { word: "in love", artist: "Pierre-Auguste Renoir" },
      { word: "bitter", artist: "Gustave Courbet" },
      { word: "awestruck", artist: "Frederic Edwin Church" },
      { word: "lost", artist: "George Frederick Watts" },
      { word: "euphoric", artist: "Henri Matisse" },
      { word: "ashamed", artist: "Domenico Ghirlandaio" },
      { word: "grateful", artist: "Jean-Baptiste-Simeon Chardin" },
      { word: "numb", artist: "Vilhelm Hammershoi" },
      { word: "jealous", artist: "Edvard Munch" },
      { word: "homesick", artist: "Thomas Cole" },
      { word: "proud", artist: "John Singer Sargent" },
      { word: "humiliated", artist: "William Hogarth" },
      { word: "curious", artist: "Jan Steen" },
      { word: "devastated", artist: "Gustave Moreau" },
      { word: "content", artist: "Pieter de Hooch" },
      { word: "hollow", artist: "Giorgio de Chirico" },
      { word: "desperate", artist: "Theodore Gericault" },
      { word: "alive", artist: "Vincent van Gogh" },
      { word: "forgotten", artist: "James McNeill Whistler" },
      { word: "dangerous", artist: "Caravaggio" },
      { word: "suffocated", artist: "Henry Fuseli" },
      { word: "electric", artist: "Joseph Mallord William Turner" },
      { word: "small", artist: "Caspar David Friedrich" },
      { word: "humiliated", artist: "William Hogarth" }
    ];

    const FALLBACK_ARTISTS = [
      "Rembrandt", "Johannes Vermeer", "Vincent van Gogh",
      "Caspar David Friedrich", "Mary Cassatt"
    ];

    let selectedMoods = [];
    let lastSearchTerms = [];

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function buildMoodGrid() {
      const grid = document.getElementById('mood-grid');
      grid.innerHTML = '';
      selectedMoods = [];
      const picked = shuffle(ALL_MOODS).slice(0, 5);
      picked.forEach(mood => {
        const btn = document.createElement('button');
        btn.className = 'mood-btn';
        btn.textContent = mood.word;
        btn.addEventListener('click', () => {
          const idx = selectedMoods.findIndex(m => m.word === mood.word);
          if (idx === -1) {
            selectedMoods.push(mood);
            btn.classList.add('selected');
          } else {
            selectedMoods.splice(idx, 1);
            btn.classList.remove('selected');
          }
        });
        grid.appendChild(btn);
      });
    }

    function getMoodEntry(word) {
      const match = ALL_MOODS.find(m => m.word.toLowerCase() === word.toLowerCase());
      if (match) return match;
      const artist = FALLBACK_ARTISTS[Math.floor(Math.random() * FALLBACK_ARTISTS.length)];
      return { word, artist };
    }

    async function searchMetForPainting(artist) {
      const url = `https://collectionapi.metmuseum.org/public/collection/v1/search?hasImages=true&medium=Paintings&q=${encodeURIComponent(artist)}`;
      const res = await fetch(url);
      const data = await res.json();
      if (!data.objectIDs || data.objectIDs.length === 0) return null;
      const candidates = shuffle(data.objectIDs).slice(0, 20);
      for (const id of candidates) {
        const objRes = await fetch(`https://collectionapi.metmuseum.org/public/collection/v1/objects/${id}`);
        const obj = await objRes.json();
        if (obj.primaryImageSmall && obj.primaryImageSmall !== '') return obj;
      }
      return null;
    }

    async function showPainting(moods) {
      const painting = await searchMetForPainting(moods[0].artist);
      if (!painting) throw new Error("Couldn't find a painting. Try a different mood.");

      const moodStr = moods.map(m => m.word).join(" and ");
      const artist = painting.artistDisplayName || "An unknown artist";
      const date = painting.objectDate || "an unknown date";

      document.getElementById('mood-display').textContent = moodStr;
      document.getElementById('painting-img').src = painting.primaryImageSmall;
      document.getElementById('painting-img').alt = painting.title;
      document.getElementById('painting-title').textContent = painting.title;
      document.getElementById('painting-artist').textContent = artist;
      document.getElementById('painting-date').textContent = date;
      document.getElementById('painting-caption').textContent =
        `${artist}, ${date}. You said you were feeling ${moodStr}.`;

      document.getElementById('loading').style.display = 'none';
      document.getElementById('result').style.display = 'flex';
    }

    async function run() {
      const customWord = document.getElementById('custom-mood').value.trim();
      let allSelected = [...selectedMoods];
      if (customWord) allSelected.push(getMoodEntry(customWord));
      if (allSelected.length === 0) {
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Select a mood or type your own.';
        return;
      }

      lastSearchTerms = allSelected;
      document.getElementById('loading').style.display = 'block';
      document.getElementById('loading').textContent = 'Looking...';
      document.getElementById('error').style.display = 'none';
      document.getElementById('result').style.display = 'none';

      try {
        await showPainting(allSelected);
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = err.message;
      }
    }

    async function tryAgain() {
      if (lastSearchTerms.length === 0) return;
      document.getElementById('result').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      document.getElementById('loading').textContent = 'Finding another...';
      try {
        await showPainting(lastSearchTerms);
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = err.message;
      }
    }

    document.getElementById('find-btn').addEventListener('click', run);
    document.getElementById('try-again').addEventListener('click', tryAgain);

    buildMoodGrid();
  </script>
</body>
</html>
