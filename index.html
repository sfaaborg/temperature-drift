<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Someone Painted This Before</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0e0e0e;
      color: #e8e8e8;
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    #container {
      max-width: 660px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      text-align: center;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: #e8e8e8;
    }

    #subtitle {
      font-size: 1.15rem;
      color: #777;
      line-height: 1.9;
      font-style: italic;
    }

    #mood-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .mood-btn {
      padding: 10px 26px;
      background: transparent;
      border: 1px solid #333;
      color: #999;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.15rem;
      font-style: italic;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mood-btn:hover { border-color: #777; color: #e8e8e8; }

    .mood-btn.selected {
      border-color: #aaa;
      color: #ffffff;
      background: #1a1a1a;
    }

    input {
      width: 100%;
      max-width: 400px;
      padding: 10px 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid #333;
      color: #e8e8e8;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.15rem;
      font-style: italic;
      outline: none;
      text-align: center;
    }

    input::placeholder { color: #444; }
    input:focus { border-bottom-color: #777; }

    #find-btn {
      padding: 12px 36px;
      background: transparent;
      border: 1px solid #555;
      color: #e8e8e8;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
    }

    #find-btn:hover { border-color: #aaa; }

    #loading { color: #555; font-size: 1.05rem; font-style: italic; }
    #error { color: #a05050; font-size: 1rem; font-style: italic; }

    #result {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 100%;
    }

    #mood-display { font-size: 0.95rem; color: #555; font-style: italic; letter-spacing: 0.06em; }

    #painting-img { max-width: 100%; max-height: 540px; object-fit: contain; }

    #painting-title { font-size: 1.4rem; color: #e8e8e8; letter-spacing: 0.04em; }
    #painting-artist { font-size: 1rem; color: #666; }
    #painting-date { font-size: 0.85rem; color: #444; }

    #painting-caption {
      font-size: 1rem;
      color: #666;
      font-style: italic;
      max-width: 440px;
      line-height: 1.9;
    }

    #try-again {
      padding: 10px 26px;
      background: transparent;
      border: 1px solid #333;
      color: #777;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1rem;
      font-style: italic;
      cursor: pointer;
      transition: all 0.2s;
    }

    #try-again:hover { border-color: #777; color: #e8e8e8; }
  </style>
</head>
<body>
  <div id="container">
    <h1>Someone Painted This Before</h1>
    <p id="subtitle">Choose how you're feeling. Find the painting that holds it.</p>

    <div id="mood-grid"></div>

    <input type="text" id="custom-mood" placeholder="or type your own word" />
    <button id="find-btn">Find my painting</button>

    <div id="loading" style="display:none">Looking...</div>
    <div id="error" style="display:none"></div>

    <div id="result" style="display:none">
      <div id="mood-display"></div>
      <img id="painting-img" src="" alt="" />
      <div id="painting-title"></div>
      <div id="painting-artist"></div>
      <div id="painting-date"></div>
      <div id="painting-caption"></div>
      <button id="try-again">find another</button>
    </div>
  </div>

  <script>
    const ALL_MOODS = [
      { word: "melancholy",   query: "solitude figure window interior" },
      { word: "restless",     query: "storm turbulent sea waves" },
      { word: "tender",       query: "mother child embrace" },
      { word: "ecstatic",     query: "ascension light heavenly figures" },
      { word: "afraid",       query: "darkness shadow figure fear" },
      { word: "lonely",       query: "figure alone empty room" },
      { word: "reverent",     query: "prayer candlelight worship" },
      { word: "furious",      query: "battle violence struggle figures" },
      { word: "hopeful",      query: "sunrise landscape morning light" },
      { word: "grief",        query: "mourning lamentation death figures" },
      { word: "serene",       query: "quiet interior woman reading light" },
      { word: "anxious",      query: "crowd city night figures" },
      { word: "nostalgic",    query: "harvest field rural figures" },
      { word: "defiant",      query: "portrait standing figure commanding" },
      { word: "dreaming",     query: "sleeping figure flowers ethereal" },
      { word: "exhausted",    query: "sleeping worker resting figure" },
      { word: "in love",      query: "couple garden embrace flowers" },
      { word: "bitter",       query: "poverty old age figure alone" },
      { word: "awestruck",    query: "vast landscape mountain waterfall" },
      { word: "lost",         query: "wanderer fog mist figure landscape" },
      { word: "euphoric",     query: "dance figures color joy" },
      { word: "ashamed",      query: "figure bowed head shame" },
      { word: "grateful",     query: "still life table bread fruit" },
      { word: "numb",         query: "empty room grey light window" },
      { word: "jealous",      query: "figures watching longing desire" },
      { word: "homesick",     query: "distant landscape memory childhood" },
      { word: "proud",        query: "portrait noble dignified figure" },
      { word: "humiliated",   query: "crowd mocking figures scene" },
      { word: "curious",      query: "figures examining objects wonder" },
      { word: "devastated",   query: "shipwreck disaster figures ruins" },
      { word: "content",      query: "courtyard sunlight domestic scene" },
      { word: "hollow",       query: "empty street shadows architecture" },
      { word: "desperate",    query: "figures clinging raft sea" },
      { word: "alive",        query: "sunflowers bold color vivid brushwork" },
      { word: "forgotten",    query: "nocturne mist river bridge grey" },
      { word: "dangerous",    query: "dramatic shadow figure candlelight" },
      { word: "suffocated",   query: "figure nightmare pressing weight" },
      { word: "electric",     query: "fire sky dramatic clouds light" },
      { word: "small",        query: "vast landscape tiny figure" },
      { word: "sad",          query: "mourning figure weeping sorrow" },
      { word: "happy",        query: "dance figures color joy celebration" },
      { word: "angry",        query: "battle violence struggle figures" },
      { word: "scared",       query: "darkness shadow figure fear" },
      { word: "tired",        query: "sleeping worker resting figure" },
      { word: "confused",     query: "figures crowd chaos street" },
      { word: "peaceful",     query: "quiet interior woman reading light" },
      { word: "bored",        query: "figure alone empty room window" },
      { word: "excited",      query: "dance figures color joy" },
      { word: "heartbroken",  query: "mourning lamentation figure alone" },
      { word: "overwhelmed",  query: "storm turbulent sea waves figures" },
      { word: "empty",        query: "empty room grey light window" },
      { word: "free",         query: "vast landscape sky figure open" },
      { word: "stuck",        query: "figure alone interior dark shadow" }
    ];

    const seen = new Set();
    const UNIQUE_MOODS = ALL_MOODS.filter(m => {
      if (seen.has(m.word)) return false;
      seen.add(m.word);
      return true;
    });

    let selectedMoods = [];
    let lastMoods = [];

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function buildMoodGrid() {
      const grid = document.getElementById('mood-grid');
      grid.innerHTML = '';
      selectedMoods = [];
      const picked = shuffle(UNIQUE_MOODS).slice(0, 5);
      picked.forEach(mood => {
        const btn = document.createElement('button');
        btn.className = 'mood-btn';
        btn.textContent = mood.word;
        btn.addEventListener('click', () => {
          const idx = selectedMoods.findIndex(m => m.word === mood.word);
          if (idx === -1) {
            selectedMoods.push(mood);
            btn.classList.add('selected');
          } else {
            selectedMoods.splice(idx, 1);
            btn.classList.remove('selected');
          }
        });
        grid.appendChild(btn);
      });
    }

    async function getMoodEntryForAnyWord(word) {
      // check curated list first
      const match = UNIQUE_MOODS.find(m => m.word.toLowerCase() === word.toLowerCase());
      if (match) return match;

      // try datamuse for related words
      try {
        const res = await fetch(`https://api.datamuse.com/words?ml=${encodeURIComponent(word)}&max=8`);
        const related = await res.json();
        if (related && related.length > 0) {
          const words = [word, ...related.map(r => r.word).slice(0, 4)].join(' ');
          return { word, query: words };
        }
      } catch (e) {
        // fall through
      }

      // last resort: use the word itself
      return { word, query: word };
    }

    async function searchMetForPainting(query) {
      const url = `https://collectionapi.metmuseum.org/public/collection/v1/search?hasImages=true&medium=Paintings&q=${encodeURIComponent(query)}`;
      const res = await fetch(url);
      const data = await res.json();
      if (!data.objectIDs || data.objectIDs.length === 0) return null;
      const candidates = shuffle(data.objectIDs).slice(0, 20);
      for (const id of candidates) {
        const objRes = await fetch(`https://collectionapi.metmuseum.org/public/collection/v1/objects/${id}`);
        const obj = await objRes.json();
        if (obj.primaryImageSmall && obj.primaryImageSmall !== '') return obj;
      }
      return null;
    }

    async function showPainting(moods) {
      const combinedQuery = moods.map(m => m.query).join(' ');
      let painting = await searchMetForPainting(combinedQuery);

      // fallback: try each mood's query individually
      if (!painting) {
        for (const mood of moods) {
          painting = await searchMetForPainting(mood.query);
          if (painting) break;
        }
      }

      // last resort: search just the mood words themselves
      if (!painting) {
        const wordQuery = moods.map(m => m.word).join(' ');
        painting = await searchMetForPainting(wordQuery);
      }

      if (!painting) throw new Error("Couldn't find a painting. Try a different word.");

      const moodStr = moods.map(m => m.word).join(' and ');
      const artist = painting.artistDisplayName || 'An unknown artist';
      const date = painting.objectDate || 'an unknown date';

      document.getElementById('mood-display').textContent = moodStr;
      document.getElementById('painting-img').src = painting.primaryImageSmall;
      document.getElementById('painting-img').alt = painting.title;
      document.getElementById('painting-title').textContent = painting.title;
      document.getElementById('painting-artist').textContent = artist;
      document.getElementById('painting-date').textContent = date;
      document.getElementById('painting-caption').textContent =
        `${artist}, ${date}. You said you were feeling ${moodStr}.`;

      document.getElementById('loading').style.display = 'none';
      document.getElementById('result').style.display = 'flex';
    }

    async function run() {
      const customWord = document.getElementById('custom-mood').value.trim();
      let allSelected = [...selectedMoods];

      document.getElementById('error').style.display = 'none';

      if (customWord) {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('loading').textContent = 'Understanding your word...';
        const entry = await getMoodEntryForAnyWord(customWord);
        allSelected.push(entry);
      }

      if (allSelected.length === 0) {
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Select a mood or type your own.';
        return;
      }

      lastMoods = allSelected;
      document.getElementById('loading').style.display = 'block';
      document.getElementById('loading').textContent = 'Looking...';
      document.getElementById('result').style.display = 'none';

      try {
        await showPainting(allSelected);
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = err.message;
      }
    }

    async function tryAgain() {
      if (lastMoods.length === 0) return;
      document.getElementById('result').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      document.getElementById('loading').textContent = 'Finding another...';
      try {
        await showPainting(lastMoods);
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = err.message;
      }
    }

    document.getElementById('find-btn').addEventListener('click', run);
    document.getElementById('try-again').addEventListener('click', tryAgain);

    buildMoodGrid();
  </script>
</body>
</html>
